<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Redirecting | Disgrace</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #050507;
      --text: #ece3de;
      --muted: #9d8d86;
      --line: rgba(255, 90, 90, 0.32);
      --panel: rgba(12, 12, 18, 0.82);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at top, rgba(120, 20, 20, 0.18), transparent 28%),
        radial-gradient(circle at bottom, rgba(20, 20, 45, 0.35), transparent 32%),
        var(--bg);
      color: var(--text);
      font-family: Georgia, "Times New Roman", serif;
    }

    main {
      width: min(560px, 100%);
      padding: 22px 20px;
      background: var(--panel);
      border: 1px solid var(--line);
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(28px, 6vw, 46px);
      font-weight: 700;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
    }

    a {
      color: var(--text);
    }
  </style>
</head>
<body>
  <main>
    <h1>Disgrace</h1>
    <p id="status">Redirecting you back to the containment system.</p>
    <p style="margin-top: 12px;">
      If nothing happens, <a id="returnLink" href="./index.html">enter manually</a>.
    </p>
  </main>
  <script>
    (() => {
      const { pathname, search, hash } = window.location;
      const segments = pathname.split("/").filter(Boolean);
      const repoBase = segments.length > 0 ? "/" + segments[0] + "/" : "/";
      const target = repoBase + "index.html" + search + hash;
      document.getElementById("returnLink").href = target;
      window.location.replace(target);
    })();
  </script>
</body>
</html>
